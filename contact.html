<body class="bg-gradient-to-br from-[#0A1428] to-[#0F1E42] text-white overflow-x-hidden">

  <!-- NAV -->
  <nav class="border-b border-[#00D4FF20]">
    <div class="max-w-7xl mx-auto px-6 py-5 flex justify-between items-center">

  <main class="pt-24 pb-20 max-w-3xl mx-auto px-6">

    <p class="text-2xl text-gray-300 text-center mb-16">No bots. Direct 1:1 conversation. Completely free.</p>

    <form class="bg-[#0F1E42]/70 p-12 rounded-3xl border border-[#00D4FF30]">
      <input type="text" placeholder="Your Name" class="w-full mb-6 p-6 bg-[#0A1428] border border-[#00D4FF30] rounded-2xl focus:border-[#00D4FF]">
